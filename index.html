<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מונדיאל 2026 - לוח משחקים</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <button type="button" id="langToggle" class="lang-toggle" aria-label="Toggle language">EN</button>
  <button type="button" id="refreshBtn" class="refresh-fab" aria-label="רענן תוצאות"><span class="r-icon">🔄</span><span class="r-text" data-i18n="refresh">רענן תוצאות</span></button>
  <button type="button" id="collapseAllBtn" class="collapse-fab" hidden><span class="c-icon">▴</span><span class="c-text" data-i18n="collapseAll">סגור הכל</span></button>
  <div class="wrap">
    <header>
      <h1><span data-i18n="title">מונדיאל 2026</span> 🏆</h1>
      <div class="sub">
        <span data-i18n="subPrefix">לוח משחקים · </span><button type="button" id="tzBtn" class="tz-link">שעון ישראל</button>
      </div>
    </header>
    <div class="filters">
      <div class="toggle-row">
        <div>
          <label for="filterQualify" data-i18n="onlyQualify">רק משחקים שעומדים בתנאים ⭐</label>
          <div class="hint"><button type="button" id="openTopInfo" class="link-btn" data-i18n="qualifyHint">טופ נבחרות</button> + <button type="button" id="openWindowInfo" class="link-btn" data-i18n="windowLink">חלון שעות לילדים</button></div>
        </div>
        <label class="switch"><input type="checkbox" id="filterQualify"><span class="slider"></span></label>
      </div>
      <div class="selects-row">
        <div class="custom-select" id="filterTeamWrap">
          <button type="button" class="cs-trigger" id="filterTeamTrigger" aria-haspopup="listbox" aria-expanded="false">
            <span class="cs-label" id="filterTeamLabel" data-i18n="allTeams">כל הנבחרות</span>
            <span class="cs-caret">▾</span>
          </button>
          <div class="cs-panel" id="filterTeamPanel" role="listbox" hidden></div>
          <select id="filterTeam" hidden><option value=""></option></select>
        </div>
        <div class="custom-select" id="filterStageWrap">
          <button type="button" class="cs-trigger" id="filterStageTrigger" aria-haspopup="listbox" aria-expanded="false">
            <span class="cs-label" id="filterStageLabel" data-i18n="allStages">כל הבתים</span>
            <span class="cs-caret">▾</span>
          </button>
          <div class="cs-panel" id="filterStagePanel" role="listbox" hidden></div>
          <select id="filterStage" hidden><option value="">כל הבתים</option></select>
        </div>
        <button type="button" id="clearFilters" class="clear-btn" data-i18n="clear" disabled>נקה</button>
      </div>
    </div>
    <div class="count-row">
      <span id="count"></span>
      <button type="button" id="todayBtn" class="today-btn" data-i18n="today" hidden>היום ⤴</button>
    </div>
    <div id="list"></div>
    <div class="note" data-i18n="note">🔒 שמות הנבחרות במשחקי הנוקאאוט (מ-28 ביוני) יתעדכנו לאחר סיום שלב הבתים. השעות כבר סופיות.</div>
    <div class="legend" data-i18n-html="legend"></div>
  </div>
  <div class="modal-overlay" id="windowModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="windowModalTitle">
      <button type="button" class="modal-close" id="closeWindowInfo" aria-label="סגור">✕</button>
      <h3 id="windowModalTitle" data-i18n="modalTitle">חלון השעות שהוגדר</h3>
      <div class="modal-body">
        <div class="win-row"><span data-i18n="winSunThu">ראשון–חמישי</span><span>14:00–21:00</span></div>
        <div class="win-row"><span data-i18n="winFri">שישי</span><span>12:00–23:00</span></div>
        <div class="win-row"><span data-i18n="winSat">שבת</span><span>07:00–21:00</span></div>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="topModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="topModalTitle">
      <button type="button" class="modal-close" id="closeTopInfo" aria-label="סגור">✕</button>
      <h3 id="topModalTitle" data-i18n="topModalTitle">נבחרות הטופ</h3>
      <div class="modal-body" id="topModalBody"></div>
    </div>
  </div>
  <div class="modal-overlay" id="scorerModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="scorerModalTitle">
      <button type="button" class="modal-close" id="closeScorerModal" aria-label="סגור">✕</button>
      <h3 id="scorerModalTitle" data-i18n="scorerModalTitle">מלך השערים</h3>
      <div class="modal-body" id="scorerModalBody"></div>
    </div>
  </div>
  <div class="modal-overlay" id="tzModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="tzModalTitle">
      <button type="button" class="modal-close" id="closeTzModal" aria-label="סגור">✕</button>
      <h3 id="tzModalTitle" data-i18n="tzModalTitle">בחר אזור זמן</h3>
      <div class="modal-body">
        <div class="tz-options" id="tzOptions"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
